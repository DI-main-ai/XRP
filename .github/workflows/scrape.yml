name: Update XRP Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 7 * * *"
    - cron: "0 17 * * *"
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check collector
        run: python -m py_compile xrp_data_collector.py

      - name: Smoke test XRPL endpoint
        run: |
          python - <<'PY'
          import requests
          payload = {
              "method": "server_info",
              "params": [{"api_version": 2}]
          }
          r = requests.post("https://xrplcluster.com", json=payload, timeout=30)
          print("HTTP", r.status_code)
          print(r.text[:500])
          r.raise_for_status()
          PY

      - name: Run collector
        run: python xrp_data_collector.py

      - name: Commit CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add csv/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update XRP data"
          git push
